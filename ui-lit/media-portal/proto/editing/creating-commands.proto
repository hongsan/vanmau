syntax = "proto3";
option  java_package = "poc.editing.generated.dto.cm";
option  java_multiple_files = true;
option  csharp_namespace = "poc.editing.cm.dto";
option  optimize_for = CODE_SIZE;

message AddPostRequest 
{
    string Title = 1;
}

message AddPostResponse 
{
    int64 PostID = 1;
}