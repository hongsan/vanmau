syntax = "proto3";
option  java_package = "poc.editing.generated.dto.cm";
option  java_multiple_files = true;
option  csharp_namespace = "poc.editing.cm.dto";
option  optimize_for = CODE_SIZE;

import "google/protobuf/timestamp.proto";

message ListEditingPostRequest {}

message ListEditingPostResponse 
{
    repeated PostData Posts = 1;

    message PostData 
    {
        int64 PostID = 1;
        string Title = 2;
        google.protobuf.Timestamp CreatedAt = 3;
    }
}

message GetEditingPostRequest 
{
    int64 PostID = 1;
}

message GetEditingPostResponse 
{
    int64 PostID = 1;
    string Title = 2;
    string Content = 3;
    string PreviewText = 4;
    uint64 PreviewImage = 5;
    repeated ImageData Images = 6;

    message ImageData 
    {
        uint64 ID = 1;
        string Url = 2;
    }
}