syntax = "proto3";
option  java_package = "base.user.dto";
option  java_multiple_files = true;
option  csharp_namespace = "base.user.dto";
option  go_package = "./;dto";
option  optimize_for = CODE_SIZE;

message ListDeptRequest {}

message ListDeptResponse
{
    repeated DeptData Depts = 1;

    message DeptData
    {
        int64 DeptID = 1;
        string Name = 2;
    }
}

