syntax = "proto3";

package scyna;
option  java_package = "scyna.proto";
option  java_multiple_files = true;
option  csharp_namespace = "scyna.proto";
option  go_package = "./;scyna_proto";
option  optimize_for = CODE_SIZE;

import "google/protobuf/timestamp.proto";

message Request
{
  uint64 TraceID = 1;
  bytes  Body = 2;
  bytes  Data = 4;
  bool   JSON = 3;
}

message Response 
{
  int32  Code = 1;
  bytes  Body = 2;
  string Token = 3;
  google.protobuf.Timestamp Expired = 4;
  string AuthRole = 5;
}

message Event 
{
  uint64 TraceID = 1;
  bytes  Body = 2;
}
