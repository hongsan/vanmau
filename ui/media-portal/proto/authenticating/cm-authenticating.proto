syntax = "proto3";
option  java_package = "poc.authenticating.cm.dto";
option  java_multiple_files = true;
option  csharp_namespace = "poc.authenticating.cm.dto";
option  go_package = "./;dto";
option  optimize_for = CODE_SIZE;

message AuthenticateContentManagerRequest 
{
	string Email = 1;
    string Password = 2;
}

message AuthenticateContentManagerResponse
{
    string 	Token = 1;
    string 	Name = 2;
    int64 	ManagerID = 3;
}

message LogoutContentManagerRequest {}

message RenewContentManagerSessionRequest 
{
	string Token = 1;
}